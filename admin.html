<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maridão Admin - Profissionais</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <style>
    :root{--bg:#fff;--bg2:#f8fafc;--p:#3b82f6;--text:#1e293b;--text2:#64748b;--red:#ef4444;--border:#e2e8f0;--rs:8px;--r:12px;}
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,system-ui,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;}
    body{background:var(--bg2);color:var(--text);padding:20px;font-size:14px;line-height:1.5;}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:20px;background:var(--bg);border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.1);}
    .logout{font-size:12px;background:var(--red);color:white;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:500;}
    .status-badge{display:inline-block;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:600;}
    .status-approved{background:#d1fae5;color:#065f46;}
    .status-pending{background:#fef3c7;color:#92400e;}
    .status-rejected{background:#fee2e2;color:#991b1b;}
    .pro-card{display:flex;gap:16px;padding:20px;background:var(--bg);border-radius:var(--r);margin-bottom:16px;border:1px solid var(--border);}
    .pro-avatar{width:64px;height:64px;border-radius:50%;background:var(--p);color:white;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0;}
    .pro-info{flex:1;}
    .pro-name{font-size:20px;font-weight:700;margin-bottom:4px;}
    .pro-email{font-size:14px;color:var(--text2);margin-bottom:8px;}
    .pro-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:13px;color:var(--text2);margin-bottom:16px;}
    .docs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px;}
    .doc-item{text-align:center;}
    .doc-thumb{width:100%;height:120px;border-radius:8px;border:2px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:48px;}
    .btn{display:inline-block;padding:10px 20px;border:none;border-radius:6px;font-weight:600;cursor:pointer;text-decoration:none;font-size:14px;min-width:120px;text-align:center;}
    .btn-approve{background:#10b981;color:white;}
    .btn-reject{background:#ef4444;color:white;}
    .btn:disabled{opacity:0.6;cursor:not-allowed;}
    .no-pros{text-align:center;padding:40px;color:var(--text2);}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top:2px solid white;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @media(max-width:768px){.pro-card{flex-direction:column;}.pro-meta{flex-direction:column;gap:8px;}}
  </style>
</head>
<body>
  <div class="header">
    <h1>👑 Maridão Admin</h1>
    <button class="logout" onclick="logout()">Sair</button>
  </div>

  <div id="loading" style="text-align:center;padding:40px;color:var(--text2);">Carregando profissionais pendentes...</div>
  <div id="content" style="display:none;"></div>

  <script>
    // Firebase config (same as main app)
    const firebaseConfig = {
      apiKey: "AIzaSyB2FLQf4WmAeL4lAv3e1b9x6j4eA9tH2mQ",
      authDomain: "maridaoapp-cbb4e.firebaseapp.com",
      projectId: "maridaoapp-cbb4e",
      storageBucket: "maridaoapp-cbb4e.firebasestorage.app",
      messagingSenderId: "812459445930",
      appId: "1:812459445930:web:a55b5e7b3e0e5b2b4c2a2e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    let currentUser = null;

    // Check admin role on auth state change
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      
      // Verify admin role via custom claim
      try {
        const token = await user.getIdTokenResult();
        if (!token.claims.admin) {
          alert('Acesso negado. Entre em contato com o suporte.');
          auth.signOut();
          return;
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        loadPendingPros();
      } catch (e) {
        console.error('Admin check failed:', e);
        auth.signOut();
      }
    });

    async function loadPendingPros() {
      try {
        const snapshot = await db.collection('professionals')
          .where('docsStatus', 'in', ['pending', 'rejected'])
          .orderBy('createdAt', 'desc')
          .get();

        const content = document.getElementById('content');
        if (snapshot.empty) {
          content.innerHTML = '<div class="no-pros">✅ Nenhum profissional pendente!</div>';
          return;
        }

        let html = '';
        snapshot.forEach(doc => {
          const pro = doc.data();
          const docId = doc.id;
          const statusClass = pro.docsStatus === 'approved' ? 'status-approved' :
                             pro.docsStatus === 'pending' ? 'status-pending' : 'status-rejected';
          
          // Generate doc thumbnails
          const docsHtml = (pro.docs || []).map((docUrl, i) => 
            `<div class="doc-item">
              <div class="doc-thumb" style="background-image:url(${docUrl}?w=160&h=120&fit=crop)" onclick="viewDoc('${docUrl}')"></div>
              <div style="font-size:12px;margin-top:4px;">Doc ${i+1}</div>
            </div>`
          ).join('');

          html += `
            <div class="pro-card">
              <div class="pro-avatar">${(pro.name || 'P').charAt(0).toUpperCase()}</div>
              <div class="pro-info">
                <div class="pro-name">${escapeHtml(pro.name || 'N/D')}</div>
                <div class="pro-email">${pro.email || ''}</div>
                <div class="pro-meta">
                  <span>Serviço: ${pro.spec || 'N/D'}</span>
                  <span>${pro.phone || ''}</span>
                  <span>Cadastrado: ${pro.createdAt ? pro.createdAt.toDate().toLocaleDateString('pt-BR') : 'N/D'}</span>
                </div>
                <div style="margin-bottom:12px">
                  <span class="status-badge ${statusClass}">${pro.docsStatus?.toUpperCase() || 'PENDENTE'}</span>
                </div>
                <div class="docs-grid">${docsHtml}</div>
                <div style="display:flex;gap:12px;">
                  <button class="btn btn-approve" onclick="approvePro('${docId}')">✅ Aprovar</button>
                  <button class="btn btn-reject" onclick="rejectPro('${docId}')">❌ Rejeitar</button>
                  <button class="btn" onclick="viewAllDocs('${docId}')" style="background:#6b7280;color:white;">Ver Todos</button>
                </div>
              </div>
            </div>`;
        });
        content.innerHTML = html;
      } catch (e) {
        console.error('Load pros failed:', e);
        document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--red);">Erro ao carregar. <button onclick="loadPendingPros()">Tentar novamente</button></div>';
      }
    }

    async function approvePro(docId) {
      if (!confirm('Aprovar este profissional?')) return;
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Aprovando...';
      
      try {
        await db.collection('professionals').doc(docId).update({
          docsStatus: 'approved',
          approvedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        toast('✅ Aprovado!');
        loadPendingPros();
      } catch (e) {
        console.error('Approve failed:', e);
        toast('Erro: ' + e.message, 'err');
        btn.disabled = false;
        btn.innerHTML = '✅ Aprovar';
      }
    }

    async function rejectPro(docId) {
      const reason = prompt('Motivo da rejeição (opcional):');
      if (!confirm('Rejeitar este profissional?' + (reason ? `\n\nMotivo: ${reason}` : ''))) return;
      
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Rejeitando...';
      
      try {
        await db.collection('professionals').doc(docId).update({
          docsStatus: 'rejected',
          rejectedReason: reason || null,
          rejectedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        toast('❌ Rejeitado!');
        loadPendingPros();
      } catch (e) {
        console.error('Reject failed:', e);
        toast('Erro: ' + e.message, 'err');
        btn.disabled = false;
        btn.innerHTML = '❌ Rejeitar';
      }
    }

    function viewDoc(url) {
      window.open(url, '_blank');
    }

    async function viewAllDocs(docId) {
      try {
        const pro = await db.collection('professionals').doc(docId).get();
        if (pro.exists) {
          const docs = pro.data().docs || [];
          let html = '<div style="text-align:center;">Documentos:<div>';
          docs.forEach((url, i) => {
            html += `<br><a href="${url}" target="_blank">Ver Doc ${i+1}</a>`;
          });
          alert(html);
        }
      } catch (e) {
        console.error('View docs failed:', e);
      }
    }

    function logout() {
      auth.signOut();
    }

    function toast(msg, type = 'ok') {
      // Simple toast (can be enhanced)
      const t = document.createElement('div');
      t.style.cssText = `
        position:fixed;top:20px;right:20px;padding:16px 20px;background:${
          type === 'ok' ? '#10b981' : '#ef4444'
        };color:white;border-radius:8px;font-weight:600;z-index:10000;box-shadow:0 4px 12px rgba(0,0,0,.15);
        animation:slideIn .3s ease-out;`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => {
        t.style.animation = 'slideOut .3s ease-in forwards';
        setTimeout(() => t.remove(), 300);
      }, 3000);
    }

    // Escape HTML
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
